<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票价格计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }

        .input-section {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: 500;
            font-size: 1.1em;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .current-price {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .current-price h2 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .current-price .price {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .buy-levels {
            display: grid;
            gap: 15px;
        }

        .buy-level {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .buy-level:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .buy-level h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .price-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .price-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .price-item .label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .price-item .value {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            display: none;
        }

        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 股票价格计算器</h1>
        
        <div class="input-section">
            <label for="priceInput">请输入当前股票价格：</label>
            <input 
                type="number" 
                id="priceInput" 
                placeholder="例如：100.00" 
                step="0.01" 
                min="0.01"
            >
            <button id="calculateBtn" onclick="calculatePrices()">计算买入价位</button>
            <div class="error-message" id="errorMessage"></div>
            <div class="loading" id="loading">正在计算...</div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="current-price">
                <h2>当前价格</h2>
                <div class="price" id="currentPriceDisplay">¥0.00</div>
            </div>

            <div class="buy-levels" id="buyLevels">
                <!-- 买入价位将在这里动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // 自动检测环境并设置 API URL
        // 如果在本地开发环境（端口不是 80 或 443），直接访问后端
        // 否则通过 Nginx 代理访问（Docker 环境）
        function getApiUrl() {
            const hostname = window.location.hostname;
            const port = window.location.port;
            const protocol = window.location.protocol;
            
            // 本地开发环境：使用 localhost:8000
            if ((hostname === 'localhost' || hostname === '127.0.0.1') && port && port !== '80' && port !== '443') {
                return 'http://localhost:8000/calculate';
            }
            
            // Docker 环境或其他环境：通过 Nginx 代理
            return '/api/calculate';
        }
        
        const API_URL = getApiUrl();

        // 允许回车键触发计算
        document.getElementById('priceInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculatePrices();
            }
        });

        async function calculatePrices() {
            const priceInput = document.getElementById('priceInput');
            const calculateBtn = document.getElementById('calculateBtn');
            const errorMessage = document.getElementById('errorMessage');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');

            // 获取输入的价格
            const price = parseFloat(priceInput.value);

            // 验证输入
            if (!price || price <= 0) {
                errorMessage.textContent = '请输入一个大于0的有效价格！';
                errorMessage.classList.add('show');
                resultSection.classList.remove('show');
                return;
            }

            // 隐藏错误信息，显示加载状态
            errorMessage.classList.remove('show');
            loading.classList.add('show');
            calculateBtn.disabled = true;
            resultSection.classList.remove('show');

            try {
                // 调用后端API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        current_price: price
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || '请求失败');
                }

                const data = await response.json();

                // 显示结果
                displayResults(data);

            } catch (error) {
                errorMessage.textContent = `错误：${error.message}。请确保后端API正在运行（http://localhost:8000）`;
                errorMessage.classList.add('show');
            } finally {
                loading.classList.remove('show');
                calculateBtn.disabled = false;
            }
        }

        function displayResults(data) {
            const resultSection = document.getElementById('resultSection');
            const currentPriceDisplay = document.getElementById('currentPriceDisplay');
            const buyLevelsContainer = document.getElementById('buyLevels');

            // 显示当前价格
            currentPriceDisplay.textContent = `¥${data.current_price.toFixed(2)}`;

            // 清空并生成买入价位
            buyLevelsContainer.innerHTML = '';

            data.buy_levels.forEach(level => {
                const levelDiv = document.createElement('div');
                levelDiv.className = 'buy-level';

                levelDiv.innerHTML = `
                    <h3>${level.level}</h3>
                    <div class="price-info">
                        <div class="price-item">
                            <div class="label">买入价格</div>
                            <div class="value">¥${level.buy_price.toFixed(2)}</div>
                        </div>
                        <div class="price-item">
                            <div class="label">止损价格</div>
                            <div class="value">¥${level.stop_loss_price.toFixed(2)}</div>
                        </div>
                        <div class="price-item">
                            <div class="label">止损幅度</div>
                            <div class="value">${level.stop_loss_percentage.toFixed(1)}%</div>
                        </div>
                    </div>
                `;

                buyLevelsContainer.appendChild(levelDiv);
            });

            // 显示结果区域
            resultSection.classList.add('show');
        }
    </script>
</body>
</html>
