<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N 规则股票池</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .control-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
        }

        input[type="date"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e94560;
            border-radius: 10px;
            font-size: 1em;
            background: #1a1a2e;
            color: #fff;
        }

        input[type="date"]:focus {
            outline: none;
            border-color: #0f3460;
        }

        button {
            padding: 12px 30px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading, .error-message, .empty-message {
            text-align: center;
            padding: 30px;
            color: #aaa;
            display: none;
        }

        .loading.show, .error-message.show, .empty-message.show {
            display: block;
        }

        .error-message {
            background: rgba(233, 69, 96, 0.1);
            color: #e94560;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .empty-message {
            color: #888;
            font-size: 1.1em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        thead {
            background: rgba(233, 69, 96, 0.2);
        }

        th {
            padding: 15px;
            text-align: left;
            color: #e94560;
            font-weight: 600;
            font-size: 0.95em;
        }

        td {
            padding: 15px;
            color: #e0e0e0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        tbody tr:hover {
            background: rgba(233, 69, 96, 0.1);
        }

        .stock-name {
            font-weight: 600;
            color: #fff;
        }

        .price-cell {
            font-weight: 500;
        }

        .buy-price {
            color: #f39c12;
            font-weight: 600;
        }

        .take-profit {
            color: #27ae60;
            font-weight: 600;
        }

        .stop-loss {
            color: #e74c3c;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .control-row {
                flex-direction: column;
            }
            th, td {
                padding: 10px 8px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>N 规则股票池</h1>

        <div class="control-row">
            <input type="date" id="dateInput">
            <button id="queryBtn" onclick="queryStockN()">查询</button>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="loading" id="loading">正在加载...</div>
        <div class="empty-message" id="emptyMessage">暂无数据</div>

        <table id="stockTable">
            <thead>
                <tr>
                    <th>股票名称</th>
                    <th>当前价格</th>
                    <th>买入价格</th>
                    <th>止盈价格</th>
                    <th>止损价格</th>
                </tr>
            </thead>
            <tbody id="stockTableBody"></tbody>
        </table>
    </div>

    <script>
        // 默认显示今天
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;

        // 回车触发查询
        document.getElementById('dateInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') queryStockN();
        });

        function getApiUrl() {
            const port = window.location.port;
            if (port && port !== '80' && port !== '443') {
                return 'http://localhost:8000';
            }
            return '';
        }

        async function queryStockN() {
            const dateInput = document.getElementById('dateInput');
            const queryBtn = document.getElementById('queryBtn');
            const errorEl = document.getElementById('errorMessage');
            const loadingEl = document.getElementById('loading');
            const emptyEl = document.getElementById('emptyMessage');
            const tableBody = document.getElementById('stockTableBody');

            const date = dateInput.value;
            if (!date) {
                errorEl.textContent = '请选择日期';
                errorEl.classList.add('show');
                return;
            }

            errorEl.classList.remove('show');
            emptyEl.classList.remove('show');
            loadingEl.classList.add('show');
            queryBtn.disabled = true;
            tableBody.innerHTML = '';

            try {
                const baseUrl = getApiUrl();
                const response = await fetch(`${baseUrl}/stock-n/${date}`);
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || '请求失败');
                }
                const data = await response.json();
                loadingEl.classList.remove('show');

                if (!data || data.length === 0) {
                    emptyEl.classList.add('show');
                    return;
                }

                data.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="stock-name">${item.name}</td>
                        <td class="price-cell">${item.price.toFixed(2)}</td>
                        <td class="buy-price">${item.buy_price.toFixed(2)}</td>
                        <td class="take-profit">${item.take_profit_price.toFixed(2)}</td>
                        <td class="stop-loss">${item.stop_loss_price.toFixed(2)}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (err) {
                loadingEl.classList.remove('show');
                errorEl.textContent = `错误：${err.message}`;
                errorEl.classList.add('show');
            } finally {
                queryBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
